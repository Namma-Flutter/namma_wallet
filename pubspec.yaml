name: namma_wallet
description: "Namma Wallet is an open-source project developed by the community
  members of Namma Flutter"
publish_to: "none"
version: 0.0.6+12

environment:
  sdk: "3.12.2"
  flutter: "3.44.2"

dependencies:
  ai_barcode_scanner: ^7.1.0
  archive: ^4.0.9
  card_stack_widget: ^0.1.6
  cross_file: ^0.3.5+1
  cupertino_icons: ^1.0.9
  dart_mappable: ^4.8.0
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_gemma: ^1.1.0
  flutter_local_notifications: ^22.0.1
  flutter_native_splash: ^2.4.8
  flutter_svg: ^2.3.0
  flutter_timezone: ^5.1.0
  gaimon: ^1.4.3
  get_it: ^9.2.1
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  google_mlkit_text_recognition: ^0.15.1
  home_widget: ^0.9.3
  html: ^0.15.6
  http: ^1.6.0
  image: ^4.7.2
  intl: ^0.20.2
  meta: ^1.18.0
  package_info_plus: ^9.0.1
  path: ^1.9.1
  path_provider: ^2.1.6
  pdfrx: ^2.4.4
  permission_handler: ^12.0.3
  pkpass: ^2.2.0
  provider: ^6.1.5+1
  qr_flutter: ^4.1.0
  screenshot: ^3.0.0
  share_handler: ^0.0.25
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  sqflite_common_ffi_web: ^1.1.2
  stack_trace: ^1.12.1
  syncfusion_flutter_pdf: ^33.2.13
  table_calendar: ^3.2.0
  talker_flutter: ^5.1.15
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  workmanager: ^0.9.0+3

dev_dependencies:
  build_runner: ^2.15.0
  change_app_package_name: ^1.5.0
  dart_mappable_builder: ^4.9.0
  flutter_gen_runner: ^5.14.1
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  home_widget_cli: ^0.0.1
  home_widget_generator: ^0.0.1
  mockito: ^5.7.0
  path_provider_platform_interface: ^2.1.3
  plugin_platform_interface: ^2.1.8
  sqflite_common_ffi: ^2.4.2
  very_good_analysis: ^10.3.0

dependency_overrides:
  analyzer: ">=8.4.1 <15.0.0"
  background_downloader: ^9.5.5

flutter:
  uses-material-design: true

flutter_gen:
  output: lib/src/features/common/generated/
  line_length: 80

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app-icon-android-foreground.png"
  image_path_ios: "assets/icon/app-icon-iOS-Default.png"

flutter_native_splash:
  # Light theme configuration
  color: "#FFFFFF"
  image: assets/icon/splash_icon.png

  # Dark theme configuration
  color_dark: "#000000"
  image_dark: assets/icon/splash_icon.png

  android_12:
    image: assets/icon/splash_icon.png
    color: "#FFFFFF"
    image_dark: assets/icon/splash_icon.png
    color_dark: "#000000"

  fullscreen: true
