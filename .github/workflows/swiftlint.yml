name: SwiftLint

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/swiftlint.yml
      - .swiftlint-version
      - ios/**

jobs:
  swiftlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read SwiftLint version
        id: swiftlint_version
        run: echo "version=$(cat .swiftlint-version)" >> "$GITHUB_OUTPUT"

      - name: Run SwiftLint
        uses: cirruslabs/swiftlint-action@v1
        with:
          version: ${{ steps.swiftlint_version.outputs.version }}
          args: --strict ios
