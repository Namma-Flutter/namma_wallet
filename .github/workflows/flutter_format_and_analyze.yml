name: flutter-format-and-analyze

on:
  pull_request:
    branches:
      - main

jobs:
  flutter-format-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Read Flutter version from pubspec.yaml
        id: flutter_version
        run: |
          VERSION=$(grep '^  flutter:' pubspec.yaml | sed 's/.*flutter: "\([^"]*\)".*/\1/')
          echo "flutter_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ steps.flutter_version.outputs.flutter_version }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check dart format
        id: format_check
        run: |
          set +e
          dart format --set-exit-if-changed .
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          # keep the workflow running so we can comment
          exit 0

      - name: Run flutter analyze (write log)
        if: ${{ steps.format_check.outputs.exit_code == '0' }}
        run: flutter analyze --write=flutter_analyze.log

      - name: Prepare PR comments
        if: always()
        run: |
          mkdir -p pr-comments
          echo "${{ github.event.pull_request.number }}" > pr-comments/pr_number

          # Handle format comment
          if [ "${{ steps.format_check.outputs.exit_code }}" != "0" ]; then
            cat << 'EOF' > pr-comments/format_comment.txt
          ❌ **Formatting check failed**
          Please run:
          ```bash
          fvm dart format .
          ```
          or
          ```bash
          dart format .
          ```
          Then push the updated files.
          EOF
          else
            echo "DELETE" > pr-comments/format_comment.txt
          fi

          # Handle analyze comment
          if [ "${{ steps.format_check.outputs.exit_code }}" == "0" ]; then
            if [ -f flutter_analyze.log ] && [ -s flutter_analyze.log ]; then
              content=$(cat flutter_analyze.log)
              {
                echo "❌ **Flutter analysis found issues:**"
                echo '```'
                echo "$content"
                echo '```'
              } > pr-comments/analyze_comment.txt
            else
              echo "✅ **Flutter analysis passed** — no issues found." > pr-comments/analyze_comment.txt
            fi
          fi

      - name: Upload PR comments artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-comments-format-analyze
          path: pr-comments/

      - name: Check format results
        if: always()
        run: |
          if [ "${{ steps.format_check.outputs.exit_code }}" != "0" ]; then
            echo "Formatting check failed with exit code ${{ steps.format_check.outputs.exit_code }}"
            exit 1
          fi
