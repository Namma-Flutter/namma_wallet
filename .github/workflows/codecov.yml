name: Upload coverage reports to Codecov

on:
  pull_request:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.38.6'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage
        id: test_run
        run: |
          set +e
          set -o pipefail
          flutter test --coverage 2>&1 | tee test_output.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      - name: Prepare PR comments
        if: always()
        run: |
          mkdir -p pr-comments
          echo "${{ github.event.pull_request.number }}" > pr-comments/pr_number

          if [ "${{ steps.test_run.outputs.exit_code }}" != "0" ]; then
            # Extract failures
            if [ -f test_output.log ]; then
              FAILURES=$(grep -A 50 "Some tests failed" test_output.log || grep -A 50 "FAILED" test_output.log || tail -n 30 test_output.log)
              if [ ${#FAILURES} -gt 4500 ]; then
                FAILURES="${FAILURES:0:4500}... (truncated)"
              fi
            else
              FAILURES="Could not find test output log"
            fi
            
            {
              echo "❌ **Test run failed**"
              echo ""
              echo "Some tests did not pass. Please review the failures below:"
              echo ""
              echo "```"
              echo "$FAILURES"
              echo "```"
              echo ""
              echo "Please fix the failing tests and push the updated code."
            } > pr-comments/test_comment.txt
          else
            {
              echo "✅ **All tests passed!**"
              echo ""
              echo "The previously failing tests are now fixed."
            } > pr-comments/test_comment.txt
          fi

      - name: Upload PR comments artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-comments-coverage
          path: pr-comments/

      # Fail the workflow if tests failed
      - name: Check test results
        if: always()
        run: |
          if [ "${{ steps.test_run.outputs.exit_code }}" != "0" ]; then
            echo "Tests failed with exit code ${{ steps.test_run.outputs.exit_code }}"
            exit 1
          fi

      - name: Install lcov
        if: ${{ steps.test_run.outputs.exit_code == '0' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: Convert coverage to lcov format
        if: ${{ steps.test_run.outputs.exit_code == '0' }}
        run: |
          # Flutter generates lcov.info by default, but we may need to ensure it's in the right format
          lcov --list-coverage coverage/lcov.info || true

      - name: Upload coverage to Codecov
        if: ${{ steps.test_run.outputs.exit_code == '0' }}
        uses: codecov/codecov-action@v5
        with:
          directory: ./coverage
          fail_ci_if_error: true
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
