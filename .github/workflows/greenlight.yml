name: greenlight

on:
  pull_request:
    branches:
      - main

jobs:
  greenlight:
    runs-on: macos-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Install Greenlight
        run: brew install revylai/tap/greenlight

      - name: Run preflight scan
        id: scan
        run: |
          set +e
          greenlight preflight . --format json --output greenlight-report.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      - name: Parse scan results
        id: results
        run: |
          mkdir -p pr-comments
          echo "${{ github.event.pull_request.number }}" > pr-comments/pr_number

          if [ ! -f greenlight-report.json ]; then
            echo "has_blocks=false" >> $GITHUB_OUTPUT
            echo "⚠️ **Greenlight report was not generated.** Check the scan step logs." > pr-comments/greenlight_comment.txt
            exit 0
          fi

          passed=$(jq -r '.summary.passed' greenlight-report.json)
          blocks=$(jq -r '.summary.blocks // 0' greenlight-report.json)
          warns=$(jq -r '.summary.warns // 0' greenlight-report.json)
          infos=$(jq -r '.summary.infos // 0' greenlight-report.json)

          echo "has_blocks=$([ "$blocks" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

          {
            if [ "$blocks" -gt 0 ]; then
              echo "❌ **Greenlight preflight found $blocks blocking issue(s)**"
            else
              echo "✅ **Greenlight preflight passed** — no blocking issues found."
            fi
            echo ""
            echo "| Severity | Count |"
            echo "| --- | --- |"
            echo "| Blocks | $blocks |"
            echo "| Warns | $warns |"
            echo "| Infos | $infos |"

            if [ "$warns" -gt 0 ]; then
              echo ""
              echo "### Warnings"
              jq -r '
                .findings[]
                | select(.severity | ascii_downcase == "warn")
                | "**\(.title)**  \n\(.detail)" + (if (.fix // "") != "" then "  \n_Fix: \(.fix)_" else "" end)
              ' greenlight-report.json 2>&1
            fi

            if [ "$infos" -gt 0 ]; then
              echo ""
              echo "### Info"
              jq -r '
                .findings[]
                | select(.severity | ascii_downcase == "info")
                | "**\(.title)**  \n\(.detail)" + (if (.fix // "") != "" then "  \n_Fix: \(.fix)_" else "" end)
              ' greenlight-report.json 2>&1
            fi
          } > pr-comments/greenlight_comment.txt

      - name: Upload PR comments artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-comments-greenlight
          path: pr-comments/

      - name: Print blocking findings
        if: steps.results.outputs.has_blocks == 'true'
        run: |
          echo "=== Greenlight Blocking Findings ==="
          jq -r '
            .findings[]
            | select(.severity | ascii_downcase == "block" or ascii_downcase == "critical")
            | "------------------------------------------------------------",
              "Guideline : \(.guideline)",
              "Title     : \(.title)",
              "Detail    : \(.detail)",
              (if (.fix // "") != "" then "Fix       : \(.fix)" else empty end)
          ' greenlight-report.json
          echo "============================================================"
          echo "Fix the above issues before submitting to the App Store."
          exit 1

      - name: Print warn and info findings
        if: always()
        run: |
          warns=$(jq -r '.summary.warns // 0' greenlight-report.json 2>/dev/null || echo 0)
          infos=$(jq -r '.summary.infos // 0' greenlight-report.json 2>/dev/null || echo 0)
          if [ "$warns" -gt 0 ] || [ "$infos" -gt 0 ]; then
            echo "=== Greenlight Warn/Info Findings ==="
            jq -r '
              .findings[]
              | select(.severity | ascii_downcase | . == "warn" or . == "info")
              | "------------------------------------------------------------",
                "Severity  : \(.severity)",
                "Guideline : \(.guideline)",
                "Title     : \(.title)",
                "Detail    : \(.detail)",
                (if (.fix // "") != "" then "Fix       : \(.fix)" else empty end)
            ' greenlight-report.json
            echo "============================================================"
          fi
